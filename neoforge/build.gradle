plugins {
    id 'net.neoforged.moddev' version '1.0.11'
    id 'maven-publish'
}

version = rootProject.mod_version
group = rootProject.maven_group

repositories {
    maven { url 'https://maven.su5ed.dev/releases' }
    mavenCentral()
}

dependencies {
    implementation project(':')
}

def targetJavaVersion = 25
tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release.set(targetJavaVersion)
    }
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
}

neoForge {
    version = rootProject.neoForge_version
    validateAccessTransformers = true
    // Pull the access widener produced for Fabric and apply it for NeoForge runs
    accessTransformers.from "../fabric/src/main/resources/chattabs.accesswidener"
    mods {
        chattabs {
            sourceSet sourceSets.main
        }
    }
}

publishing { publications { create('mavenJava', MavenPublication) { from components.java } } }
